<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Study Tracker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f0f;
    --bg2: #1a1a1a;
    --bg3: #242424;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #e8e8e6;
    --text2: #888884;
    --text3: #555552;
    --green: #1D9E75;
    --green-light: #E1F5EE;
    --green-dark: #0F6E56;
    --amber: #BA7517;
    --amber-light: #FAEEDA;
    --red: #E24B4A;
    --mono: 'Courier New', Courier, monospace;
    --radius: 8px;
    --radius-lg: 12px;
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
  header { padding: 1rem 1.5rem; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 15px; font-weight: 500; letter-spacing: 0.04em; color: var(--text); }
  header .streak { font-size: 13px; color: var(--amber); font-weight: 500; }
  .layout { display: flex; flex: 1; min-height: 0; }
  .sidebar { width: 220px; flex-shrink: 0; border-right: 0.5px solid var(--border); padding: 1rem; display: flex; flex-direction: column; gap: 14px; overflow-y: auto; }
  .main { flex: 1; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; overflow-y: auto; }
  .section-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; }
  .proj-list { display: flex; flex-direction: column; gap: 2px; }
  .proj-item { display: flex; align-items: center; gap: 9px; padding: 7px 9px; border-radius: var(--radius); cursor: pointer; border: 0.5px solid transparent; transition: background 0.12s, border-color 0.12s; }
  .proj-item:hover { background: var(--bg3); }
  .proj-item.active { background: var(--bg3); border-color: var(--border2); }
  .proj-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .proj-name { font-size: 13px; color: var(--text); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .proj-acc { font-size: 11px; color: var(--text3); font-family: var(--mono); }
  .del-btn { font-size: 11px; color: var(--text3); opacity: 0; cursor: pointer; padding: 0 2px; transition: opacity 0.12s; }
  .proj-item:hover .del-btn { opacity: 1; }
  .del-btn:hover { color: var(--red); }
  .add-form { display: flex; flex-direction: column; gap: 6px; }
  .add-form input[type=text] { width: 100%; background: var(--bg3); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 7px 10px; font-size: 13px; color: var(--text); outline: none; transition: border-color 0.12s; }
  .add-form input[type=text]:focus { border-color: var(--border2); }
  .color-row { display: flex; gap: 5px; flex-wrap: wrap; }
  .swatch { width: 16px; height: 16px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: border-color 0.12s, transform 0.12s; }
  .swatch:hover { transform: scale(1.15); }
  .swatch.sel { border-color: var(--text); }
  .btn-add { background: var(--green); border: none; border-radius: var(--radius); padding: 7px 10px; font-size: 13px; color: #E1F5EE; cursor: pointer; font-weight: 500; transition: background 0.12s; }
  .btn-add:hover { background: var(--green-dark); }
  .goal-wrap { margin-top: auto; padding-top: 12px; border-top: 0.5px solid var(--border); }
  .goal-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .goal-lbl { font-size: 11px; color: var(--text3); }
  .goal-input { width: 42px; background: var(--bg3); border: 0.5px solid var(--border); border-radius: 4px; padding: 2px 6px; font-size: 12px; font-family: var(--mono); color: var(--text); text-align: center; outline: none; }
  .goal-input:focus { border-color: var(--border2); }
  .timer-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 2rem; text-align: center; }
  .timer-proj-label { font-size: 12px; margin-bottom: 10px; }
  .timer-display { font-family: var(--mono); font-size: 56px; font-weight: 500; letter-spacing: 0.02em; margin-bottom: 1.5rem; line-height: 1; color: var(--text); transition: color 0.3s; }
  .timer-display.running { color: var(--green); }
  .timer-display.paused { color: var(--amber); }
  .timer-controls { display: flex; gap: 10px; justify-content: center; }
  .btn { padding: 9px 22px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: transparent; color: var(--text); font-size: 13px; cursor: pointer; transition: background 0.12s; font-family: inherit; }
  .btn:hover { background: var(--bg3); }
  .btn.primary { background: var(--green); border-color: var(--green); color: #E1F5EE; }
  .btn.primary:hover { background: var(--green-dark); border-color: var(--green-dark); }
  .btn.danger { border-color: var(--red); color: var(--red); }
  .btn.danger:hover { background: rgba(226,75,74,0.08); }
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .stat-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 12px 14px; }
  .stat-val { font-size: 20px; font-weight: 500; font-family: var(--mono); color: var(--text); }
  .stat-lbl { font-size: 10px; color: var(--text3); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.07em; }
  .goal-bar-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 12px 14px; }
  .goal-bar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .goal-bar-title { font-size: 12px; color: var(--text2); }
  .goal-bar-pct { font-size: 12px; font-family: var(--mono); color: var(--text); }
  .goal-bar-bg { background: var(--bg3); border-radius: 3px; height: 5px; overflow: hidden; }
  .goal-bar-fill { height: 100%; background: var(--green); border-radius: 3px; transition: width 0.8s ease; }
  .goal-bar-fill.done { background: #639922; }
  .sessions-section { flex: 1; }
  .sessions-title { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
  .session-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 0.5px solid var(--border); }
  .session-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .session-proj { font-size: 13px; color: var(--text); flex: 1; }
  .session-time { font-size: 11px; color: var(--text3); font-family: var(--mono); }
  .session-dur { font-size: 13px; color: var(--text2); font-family: var(--mono); }
  .empty { font-size: 13px; color: var(--text3); padding: 12px 0; text-align: center; }
  .no-proj-msg { display: flex; align-items: center; justify-content: center; height: 130px; color: var(--text3); font-size: 14px; }
  @media (max-width: 600px) {
    .layout { flex-direction: column; }
    .sidebar { width: 100%; border-right: none; border-bottom: 0.5px solid var(--border); }
    .stats-grid { grid-template-columns: repeat(3, 1fr); }
    .timer-display { font-size: 40px; }
  }
</style>
</head>
<body>
<header>
  <h1>Study Tracker</h1>
  <span class="streak" id="streak-badge"></span>
</header>
<div class="layout">
  <aside class="sidebar">
    <div class="section-label">Projetos</div>
    <div class="proj-list" id="proj-list"></div>
    <div>
      <div class="section-label" style="margin-bottom:8px;">Novo projeto</div>
      <div class="add-form">
        <input type="text" id="new-name" placeholder="Nome do projeto..." maxlength="28" />
        <div class="color-row" id="color-row"></div>
        <button class="btn-add" id="btn-add">+ Criar projeto</button>
      </div>
    </div>
    <div class="goal-wrap">
      <div class="goal-row">
        <span class="goal-lbl">Meta diária:</span>
        <input class="goal-input" type="number" id="goal-input" min="0.5" max="16" step="0.5" value="4" />
        <span class="goal-lbl">h</span>
      </div>
    </div>
  </aside>
  <main class="main">
    <div id="timer-section"></div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-val" id="s-today">0:00</div><div class="stat-lbl">Hoje</div></div>
      <div class="stat-card"><div class="stat-val" id="s-total">0:00</div><div class="stat-lbl">Total geral</div></div>
      <div class="stat-card"><div class="stat-val" id="s-sess">0</div><div class="stat-lbl">Sessões hoje</div></div>
    </div>
    <div class="goal-bar-card">
      <div class="goal-bar-header">
        <span class="goal-bar-title">Progresso da meta diária</span>
        <span class="goal-bar-pct" id="goal-pct">0%</span>
      </div>
      <div class="goal-bar-bg"><div class="goal-bar-fill" id="goal-bar" style="width:0%"></div></div>
    </div>
    <div class="sessions-section">
      <div class="sessions-title">Sessões de hoje</div>
      <div id="sess-list"></div>
    </div>
  </main>
</div>
<script>
const COLORS = ['#1D9E75','#378ADD','#D85A30','#D4537E','#BA7517','#639922','#7F77DD','#888780'];
const STORAGE_KEY = 'study_tracker_v1';
let selColor = COLORS[0];

let state = { projects: [], sessions: [], goalHours: 4 };

let timer = { projId: null, status: 'idle', elapsed: 0, startedAt: null };
let ticker = null;

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) { const s = JSON.parse(raw); state.projects = s.projects||[]; state.sessions = s.sessions||[]; state.goalHours = s.goalHours||4; }
  } catch(e) {}
}

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

function todayKey() { return new Date().toISOString().slice(0,10); }

function fmt(sec) {
  const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = sec%60;
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function fmtDur(sec) {
  const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = sec%60;
  if (h > 0) return `${h}h ${m}m`;
  if (m > 0) return `${m}m ${s}s`;
  return `${s}s`;
}

function fmtClock(ts) {
  return new Date(ts).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
}

function getStreak() {
  const days = new Set(state.sessions.map(s => s.date));
  if (!days.has(todayKey())) return 0;
  let n = 0, d = new Date();
  while (days.has(d.toISOString().slice(0,10))) { n++; d.setDate(d.getDate()-1); }
  return n;
}

function setupColors() {
  const el = document.getElementById('color-row');
  el.innerHTML = COLORS.map(c =>
    `<div class="swatch ${c===selColor?'sel':''}" data-c="${c}" style="background:${c}"></div>`
  ).join('');
  el.querySelectorAll('.swatch').forEach(sw => sw.addEventListener('click', () => {
    selColor = sw.dataset.c; setupColors();
  }));
}

function renderProjects() {
  const el = document.getElementById('proj-list');
  if (!state.projects.length) { el.innerHTML = '<div class="empty">Nenhum projeto ainda</div>'; return; }
  el.innerHTML = state.projects.map(p => {
    const secs = state.sessions.filter(s => s.projId===p.id).reduce((a,s)=>a+s.duration,0);
    return `<div class="proj-item ${timer.projId===p.id?'active':''}" data-id="${p.id}">
      <div class="proj-dot" style="background:${p.color}"></div>
      <span class="proj-name">${escHtml(p.name)}</span>
      <span class="proj-acc">${secs>0?fmtDur(secs):''}</span>
      <span class="del-btn" data-del="${p.id}">✕</span>
    </div>`;
  }).join('');
  el.querySelectorAll('.proj-item').forEach(item => item.addEventListener('click', e => {
    if (e.target.dataset.del) { deleteProj(e.target.dataset.del); return; }
    selectProj(item.dataset.id);
  }));
}

function renderTimer() {
  const sec = document.getElementById('timer-section');
  const proj = state.projects.find(p => p.id === timer.projId);
  if (!proj) { sec.innerHTML = '<div class="no-proj-msg">← Selecione ou crie um projeto</div>'; return; }
  const cls = timer.status === 'running' ? 'running' : timer.status === 'paused' ? 'paused' : '';
  let btns = '';
  if (timer.status === 'idle') btns = `<button class="btn primary" id="b-start">▶ Iniciar</button>`;
  else if (timer.status === 'running') btns = `<button class="btn" id="b-pause">⏸ Pausar</button><button class="btn danger" id="b-stop">■ Finalizar</button>`;
  else btns = `<button class="btn primary" id="b-resume">▶ Retomar</button><button class="btn danger" id="b-stop">■ Finalizar</button>`;
  sec.innerHTML = `<div class="timer-card">
    <div class="timer-proj-label" style="color:${proj.color}">● ${escHtml(proj.name)}</div>
    <div class="timer-display ${cls}" id="t-display">${fmt(timer.elapsed)}</div>
    <div class="timer-controls">${btns}</div>
  </div>`;
  document.getElementById('b-start')?.addEventListener('click', startTimer);
  document.getElementById('b-pause')?.addEventListener('click', pauseTimer);
  document.getElementById('b-resume')?.addEventListener('click', resumeTimer);
  document.getElementById('b-stop')?.addEventListener('click', () => stopTimer(true));
}

function renderStats() {
  const today = todayKey();
  const todaySess = state.sessions.filter(s => s.date === today);
  let todaySecs = todaySess.reduce((a,s) => a+s.duration, 0);
  if (timer.status !== 'idle') todaySecs += timer.elapsed;
  const totalSecs = state.sessions.reduce((a,s) => a+s.duration, 0) + (timer.status!=='idle' ? timer.elapsed : 0);
  document.getElementById('s-today').textContent = fmt(todaySecs);
  document.getElementById('s-total').textContent = fmt(totalSecs);
  document.getElementById('s-sess').textContent = todaySess.length + (timer.status!=='idle'?'*':'');
  const goalSecs = (state.goalHours||4) * 3600;
  const pct = Math.min(100, Math.round(todaySecs/goalSecs*100));
  document.getElementById('goal-pct').textContent = pct + '%';
  const bar = document.getElementById('goal-bar');
  bar.style.width = pct + '%';
  pct >= 100 ? bar.classList.add('done') : bar.classList.remove('done');
}

function renderSessions() {
  const el = document.getElementById('sess-list');
  const today = todayKey();
  const rows = [...state.sessions].filter(s => s.date===today).reverse();
  if (!rows.length) { el.innerHTML = '<div class="empty">Nenhuma sessão finalizada ainda hoje</div>'; return; }
  el.innerHTML = rows.map(s => {
    const proj = state.projects.find(p => p.id===s.projId);
    return `<div class="session-row">
      <div class="session-dot" style="background:${proj?.color||'#888'}"></div>
      <span class="session-proj">${escHtml(proj?.name||'Removido')}</span>
      <span class="session-time">${fmtClock(s.endedAt)}</span>
      <span class="session-dur">${fmtDur(s.duration)}</span>
    </div>`;
  }).join('');
}

function renderStreak() {
  const streak = getStreak();
  document.getElementById('streak-badge').textContent = streak > 1 ? `${streak} dias 🔥` : '';
}

function renderAll() {
  renderProjects(); renderTimer(); renderStats(); renderSessions(); renderStreak();
}

function selectProj(id) {
  if (timer.status === 'running') stopTimer(false);
  timer = { projId: id, status: 'idle', elapsed: 0, startedAt: null };
  clearInterval(ticker);
  renderAll();
}

function deleteProj(id) {
  if (timer.projId === id) { clearInterval(ticker); timer = { projId: null, status: 'idle', elapsed: 0, startedAt: null }; }
  state.projects = state.projects.filter(p => p.id !== id);
  state.sessions = state.sessions.filter(s => s.projId !== id);
  save(); renderAll();
}

function startTimer() {
  timer.status = 'running';
  timer.startedAt = Date.now() - timer.elapsed * 1000;
  ticker = setInterval(tick, 1000);
  renderTimer(); renderProjects();
}

function pauseTimer() {
  clearInterval(ticker);
  timer.status = 'paused';
  renderTimer(); renderProjects();
}

function resumeTimer() {
  timer.startedAt = Date.now() - timer.elapsed * 1000;
  timer.status = 'running';
  ticker = setInterval(tick, 1000);
  renderTimer(); renderProjects();
}

function stopTimer(doSave) {
  clearInterval(ticker);
  if (doSave && timer.elapsed > 5) {
    state.sessions.push({ id: Date.now(), projId: timer.projId, duration: timer.elapsed, date: todayKey(), endedAt: Date.now() });
    save();
  }
  timer.status = 'idle'; timer.elapsed = 0; timer.startedAt = null;
  renderAll();
}

function tick() {
  timer.elapsed = Math.floor((Date.now() - timer.startedAt) / 1000);
  const el = document.getElementById('t-display');
  if (el) el.textContent = fmt(timer.elapsed);
  renderStats();
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('btn-add').addEventListener('click', () => {
  const name = document.getElementById('new-name').value.trim();
  if (!name) return;
  state.projects.push({ id: String(Date.now()), name, color: selColor });
  save(); document.getElementById('new-name').value = ''; renderAll();
});

document.getElementById('new-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btn-add').click();
});

document.getElementById('goal-input').addEventListener('change', e => {
  state.goalHours = parseFloat(e.target.value) || 4;
  save(); renderStats();
});

load();
document.getElementById('goal-input').value = state.goalHours;
setupColors();
renderAll();
</script>
</body>
</html>
